name: RuboCop

on: [pull_request]

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.6'
          bundler-cache: true
      - name: Install dependencies
        run: bundle update
      - name: Run RuboCop
        run: bundle exec rubocop --format github
